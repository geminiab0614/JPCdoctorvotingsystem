<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>衛生福利部嘉南療養院 - 醫科優良醫師票選系統</title>
    
    <!-- 1. 載入 React 和 Babel (使用 UMD 版本以確保相容性) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 2. 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 3. 載入 Firebase (Compat 版本) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        .animate-scale-in { animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        /* 隱藏 number input 的箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }
        input[type=number] {
          -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        // --- 0. 全域變數定義 ---
        const { useState, useEffect } = React;

        // --- 1. 圖示元件 (SVG) ---
        const Icons = {
            UserCircle2: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></svg>,
            Lock: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            ArrowLeft: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
            CheckCircle2: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>,
            AlertCircle: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>,
            Trash2: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
            LogOut: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
            Settings: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            FileText: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>,
            Calendar: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
            AlertTriangle: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>,
            RefreshCw: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>,
            Users: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            Eye: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>,
            KeyRound: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4Z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/></svg>,
            Save: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-2a2 2 0 0 0-2-2H9a2 2 0 0 0-2 2v2"/><path d="M7 3v5h8V3"/></svg>,
            X: ({size=20, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        };

        // --- 2. 初始化 Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyAk00IEZ3moWmZi0hiDJzyjrLmt_LrYPI8",
            authDomain: "jianan-voting.firebaseapp.com",
            projectId: "jianan-voting",
            storageBucket: "jianan-voting.firebasestorage.app",
            messagingSenderId: "159969110468",
            appId: "1:159969110468:web:00ebc439052c1f0a6cdc91",
            measurementId: "G-XBZPE29021"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // --- 3. 定義常數與主題 ---
        const ROLES = { ATTENDING: 'attending', RESIDENT: 'resident', ADMIN: 'admin' };
        
        const THEMES = {
            blue: { name: '經典藍 (預設)', bgGradient: 'from-slate-100 to-blue-50', headerGradient: 'from-blue-600 to-blue-800', buttonGradient: 'from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800', text: 'text-blue-800', border: 'border-blue-200', lightBg: 'bg-blue-50' },
            orange: { name: '溫暖橘', bgGradient: 'from-orange-50 to-amber-50', headerGradient: 'from-orange-500 to-red-600', buttonGradient: 'from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700', text: 'text-orange-800', border: 'border-orange-200', lightBg: 'bg-orange-50' },
            green: { name: '自然綠', bgGradient: 'from-emerald-50 to-teal-50', headerGradient: 'from-emerald-600 to-teal-700', buttonGradient: 'from-emerald-600 to-emerald-700 hover:from-emerald-700 hover:to-emerald-800', text: 'text-emerald-800', border: 'border-emerald-200', lightBg: 'bg-emerald-50' },
            purple: { name: '高雅紫', bgGradient: 'from-purple-50 to-violet-50', headerGradient: 'from-violet-600 to-purple-800', buttonGradient: 'from-violet-600 to-violet-700 hover:from-violet-700 hover:to-violet-800', text: 'text-purple-800', border: 'border-violet-200', lightBg: 'bg-violet-50' },
            gray: { name: '現代灰', bgGradient: 'from-gray-100 to-slate-200', headerGradient: 'from-slate-700 to-slate-900', buttonGradient: 'from-slate-600 to-slate-700 hover:from-slate-700 hover:to-slate-800', text: 'text-slate-800', border: 'border-slate-300', lightBg: 'bg-slate-100' },
            gold: { name: '尊爵金', bgGradient: 'from-yellow-50 via-amber-50 to-orange-50', headerGradient: 'from-yellow-600 via-amber-500 to-yellow-700', buttonGradient: 'from-amber-500 to-yellow-600 hover:from-amber-600 hover:to-yellow-700', text: 'text-amber-900', border: 'border-amber-300', lightBg: 'bg-amber-50' },
            silver: { name: '科技銀', bgGradient: 'from-gray-50 via-slate-100 to-gray-200', headerGradient: 'from-slate-500 via-gray-500 to-slate-600', buttonGradient: 'from-slate-500 to-gray-600 hover:from-slate-600 hover:to-gray-700', text: 'text-slate-800', border: 'border-slate-300', lightBg: 'bg-slate-100' }
        };

        // --- 4. 元件：VotingForm (投票表單) ---
        const VotingForm = ({ voter, config, allDoctors, onVoteComplete, onLogout }) => {
            const [selectedTargets, setSelectedTargets] = useState([]);
            const [existingVoteId, setExistingVoteId] = useState(null); // 用於存放舊選票的 ID
            const [submitting, setSubmitting] = useState(false);
            const [showPwdModal, setShowPwdModal] = useState(false);
            const [newPassword, setNewPassword] = useState('');
            const [isVotingOpen, setIsVotingOpen] = useState(true);

            const theme = THEMES[config.theme || 'blue'];

            useEffect(() => {
                checkVotingPeriod();
                loadExistingVote();
            }, [config]);

            const checkVotingPeriod = () => {
                const now = new Date();
                const startDate = new Date((config.votingStart?.year || config.currentYear) + 1911, (config.votingStart?.month || config.currentMonth) - 1, config.votingStart?.day || 1, 0, 0, 0);
                const endDate = new Date((config.votingEnd?.year || config.currentYear) + 1911, (config.votingEnd?.month || config.currentMonth) - 1, config.votingEnd?.day || 31, 23, 59, 59);
                setIsVotingOpen(now >= startDate && now <= endDate);
            };

            const loadExistingVote = async () => {
                try {
                    const snap = await db.collection('votes')
                        .where("voterName", "==", voter.name)
                        .where("year", "==", config.currentYear)
                        .where("month", "==", config.currentMonth)
                        .get();
                    if (!snap.empty) {
                        const data = snap.docs[0].data();
                        setSelectedTargets(data.targetNames || []);
                        setExistingVoteId(snap.docs[0].id);
                    }
                } catch (e) {
                    console.error("載入舊選票失敗", e);
                }
            };

            const isVoterResident = voter.role === ROLES.RESIDENT;
            const targetRole = isVoterResident ? ROLES.ATTENDING : ROLES.RESIDENT;
            const targetLabel = isVoterResident ? '優良主治醫師' : '優良住院醫師';
            const maxVotes = isVoterResident ? 3 : 2;

            const candidates = allDoctors
                .filter(d => d.role === targetRole)
                .sort((a, b) => a.name.localeCompare(b.name, 'zh-TW'));

            const toggleSelection = (name) => {
                if (selectedTargets.includes(name)) {
                    setSelectedTargets(prev => prev.filter(n => n !== name));
                } else {
                    if (selectedTargets.length >= maxVotes) {
                        alert(`您最多只能選擇 ${maxVotes} 位${targetLabel}`);
                        return;
                    }
                    setSelectedTargets(prev => [...prev, name]);
                }
            };

            const handleSubmit = async () => {
                if (selectedTargets.length === 0) {
                    if (!window.confirm('您尚未選擇任何候選人，確定要送出空白選票嗎？')) return;
                }
                
                setSubmitting(true);
                try {
                    const voteData = {
                        voterName: voter.name,
                        voterRole: voter.role,
                        targetNames: selectedTargets,
                        year: config.currentYear,
                        month: config.currentMonth,
                        timestamp: Date.now()
                    };

                    if (existingVoteId) {
                        // 更新現有選票
                        await db.collection('votes').doc(existingVoteId).update(voteData);
                        alert('選票已成功更新！');
                    } else {
                        // 新增選票
                        await db.collection('votes').add(voteData);
                        alert('投票成功！感謝您的參與。');
                    }
                    onVoteComplete();
                } catch (error) {
                    alert('傳送失敗，請稍後再試');
                } finally {
                    setSubmitting(false);
                }
            };

            const handleChangePassword = async () => {
                if (newPassword.length !== 4 || isNaN(Number(newPassword))) {
                    alert("請輸入4位數字密碼");
                    return;
                }
                try {
                    await db.collection('doctors').doc(voter.id).update({ password: newPassword });
                    alert("密碼修改成功");
                    setShowPwdModal(false);
                } catch (e) {
                    alert("修改失敗");
                }
            };

            return (
                <div className="max-w-3xl mx-auto bg-white rounded-xl shadow-xl overflow-hidden my-6 border border-gray-100 animate-scale-in">
                    <div className={`bg-gradient-to-r ${theme.headerGradient} p-6 border-b ${theme.border} text-white`}>
                        <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                           <div>
                              <h2 className="text-2xl font-bold mb-1 drop-shadow-md">民國{config.currentYear}年 {config.currentMonth}月 優良醫師票選</h2>
                              <p className="text-white/90 text-sm">
                                歡迎，<span className="font-bold underline">{voter.name}</span> {voter.role === ROLES.RESIDENT ? '住院醫師' : '主治醫師'}
                                {existingVoteId && <span className="ml-2 bg-yellow-400 text-yellow-900 px-2 py-0.5 rounded-full text-xs font-bold">已填寫 (可修改)</span>}
                              </p>
                           </div>
                           <div className="flex gap-2">
                             <button onClick={() => setShowPwdModal(true)} className="flex items-center gap-1 text-xs bg-white/20 hover:bg-white/30 text-white px-3 py-1.5 rounded backdrop-blur-sm border border-white/30 transition-all"><Icons.KeyRound size={14}/> 修改密碼</button>
                             <button onClick={onLogout} className="flex items-center gap-1 text-xs bg-white text-gray-800 hover:bg-gray-100 px-3 py-1.5 rounded shadow-sm transition-all font-bold">登出</button>
                           </div>
                        </div>
                    </div>

                    {showPwdModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-lg p-6 w-full max-w-sm shadow-2xl animate-scale-in border-t-4 border-blue-500">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-gray-800">修改個人密碼</h3>
                                    <button onClick={() => setShowPwdModal(false)} className="text-gray-400 hover:text-gray-600"><Icons.X size={20}/></button>
                                </div>
                                <input type="text" maxLength={4} placeholder="請輸入新的4位數字" className="w-full border-2 border-gray-200 p-2 rounded mb-4 text-center text-lg tracking-widest focus:border-blue-500 outline-none transition-colors" value={newPassword} onChange={e => setNewPassword(e.target.value)}/>
                                <button onClick={handleChangePassword} className={`w-full bg-gradient-to-r ${theme.buttonGradient} text-white py-2 rounded shadow-md flex items-center justify-center gap-2 transition-transform active:scale-95`}><Icons.Save size={16}/> 儲存變更</button>
                            </div>
                        </div>
                    )}

                    <div className="p-6">
                        <div className={`${theme.lightBg} border-l-4 ${theme.border} p-4 mb-6 shadow-sm rounded-r`}>
                            <div className="flex">
                                <Icons.AlertCircle className={`h-5 w-5 ${theme.text}`} />
                                <div className="ml-3">
                                    <p className={`text-sm ${theme.text} font-bold`}>投票規則說明：</p>
                                    <ul className={`list-disc list-inside text-sm ${theme.text} mt-1 space-y-1 opacity-80`}>
                                        <li>本月將選出<strong>兩位{targetLabel}</strong>。</li>
                                        <li>您可以投 <strong>0 到 {maxVotes} 位</strong>{targetLabel}。</li>
                                        <li><strong>期限：</strong>民國{config.votingStart?.year || config.currentYear}年{config.votingStart?.month || config.currentMonth}月{config.votingStart?.day || 1}日 至 {config.votingEnd?.year || config.currentYear}年{config.votingEnd?.month || config.currentMonth}月{config.votingEnd?.day || 31}日</li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        {!isVotingOpen ? (
                            <div className="text-center py-10 bg-gray-50 rounded-lg border-2 border-dashed border-gray-300">
                                <h3 className="text-xl font-bold text-gray-500">目前非開放投票期間</h3>
                                <p className="text-gray-400 mt-2">請於指定期限內進行操作</p>
                            </div>
                        ) : (
                            <>
                                <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2">請勾選 {targetLabel} <span className="text-xs font-normal text-white bg-gray-500 px-2 py-1 rounded-full shadow-sm">已選 {selectedTargets.length} / {maxVotes}</span></h3>
                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-8">
                                    {candidates.map(candidate => {
                                        const isSelected = selectedTargets.includes(candidate.name);
                                        return (
                                            <div key={candidate.id} onClick={() => toggleSelection(candidate.name)} className={`cursor-pointer p-3 rounded-lg border-2 transition-all flex items-center justify-between select-none ${isSelected ? `border-current ${theme.text} ${theme.lightBg} shadow-md transform scale-[1.02]` : 'border-gray-200 hover:border-gray-300 text-gray-700 bg-white'}`}>
                                                <span className="font-medium">{candidate.name}</span>
                                                {isSelected && <div className={`${theme.text}`}><Icons.CheckCircle2 /></div>}
                                            </div>
                                        );
                                    })}
                                </div>
                                <button onClick={handleSubmit} disabled={submitting} className={`w-full py-3 rounded-lg font-bold text-lg shadow-lg transition-all transform active:scale-95 ${submitting ? 'bg-gray-400 cursor-not-allowed' : `bg-gradient-to-r ${theme.buttonGradient} text-white`}`}>{submitting ? '處理中...' : (existingVoteId ? '更新我的選票' : '確認送出選票')}</button>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        // --- 5. 元件：AdminDashboard (後台) ---
        const AdminDashboard = ({ config, onLogout, onConfigUpdate }) => {
            const [activeTab, setActiveTab] = useState('results');
            const [doctors, setDoctors] = useState([]);
            const [votes, setVotes] = useState([]);
            const [loading, setLoading] = useState(false);
            const [viewYear, setViewYear] = useState(config.currentYear);
            const [viewMonth, setViewMonth] = useState(config.currentMonth);
            const [editYear, setEditYear] = useState(config.currentYear);
            const [editMonth, setEditMonth] = useState(config.currentMonth);
            const [votingStart, setVotingStart] = useState(config.votingStart || { year: config.currentYear, month: config.currentMonth, day: 1 });
            const [votingEnd, setVotingEnd] = useState(config.votingEnd || { year: config.currentYear, month: config.currentMonth, day: 15 });
            const [selectedTheme, setSelectedTheme] = useState(config.theme || 'blue');
            const [newPassword, setNewPassword] = useState('');
            const [newDocName, setNewDocName] = useState('');
            const [newDocRole, setNewDocRole] = useState(ROLES.RESIDENT);
            const [deleteTarget, setDeleteTarget] = useState(null);

            useEffect(() => { loadData(); }, [activeTab, viewYear, viewMonth]);

            const loadData = async () => {
                setLoading(true);
                try {
                    const docSnap = await db.collection('doctors').get();
                    const ds = docSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    ds.sort((a, b) => a.name.localeCompare(b.name, 'zh-TW'));
                    setDoctors(ds);

                    if (activeTab === 'results') {
                        const vsSnap = await db.collection('votes').where("year", "==", viewYear).where("month", "==", viewMonth).get();
                        setVotes(vsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    }
                } catch (e) { alert('載入失敗'); } finally { setLoading(false); }
            };

            const handleAddDoctor = async () => {
                if (!newDocName.trim()) return;
                await db.collection('doctors').add({ name: newDocName.trim(), role: newDocRole, isActive: true, password: '0000' });
                setNewDocName(''); loadData();
            };

            const executeDelete = async () => {
                if (!deleteTarget) return;
                try {
                    if (deleteTarget.type === 'doctor') await db.collection('doctors').doc(deleteTarget.id).delete();
                    else await db.collection('votes').doc(deleteTarget.id).delete();
                    setDeleteTarget(null); loadData();
                } catch (e) { alert('刪除失敗'); }
            };

            const handleUpdateSettings = async () => {
                const updatedConfig = { ...config, currentYear: Number(editYear), currentMonth: Number(editMonth), theme: selectedTheme, votingStart: { year: Number(votingStart.year), month: Number(votingStart.month), day: Number(votingStart.day) }, votingEnd: { year: Number(votingEnd.year), month: Number(votingEnd.month), day: Number(votingEnd.day) } };
                if (newPassword) updatedConfig.adminPassword = newPassword;
                await db.collection('config').get().then(s => s.docs[0].ref.set(updatedConfig));
                alert('設定已更新'); setNewPassword(''); onConfigUpdate();
            };

            const handleResetVotes = async () => {
                if (!confirm("確定清空本月資料？")) return;
                if (prompt("輸入「確認清空」") !== "確認清空") return;
                const vsSnap = await db.collection('votes').where("year", "==", config.currentYear).where("month", "==", config.currentMonth).get();
                const batch = db.batch(); vsSnap.docs.forEach(d => batch.delete(d.ref)); await batch.commit();
                alert('清空完成'); loadData();
            };

            const calculateResults = (role) => {
                const voterRoleFilter = role === ROLES.ATTENDING ? ROLES.RESIDENT : ROLES.ATTENDING;
                const relevantVotes = votes.filter(v => v.voterRole === voterRoleFilter);
                const scores = {};
                relevantVotes.forEach(v => (v.targetNames || []).forEach(name => scores[name] = (scores[name] || 0) + 1));
                const results = Object.entries(scores).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);
                const top2Scores = Array.from(new Set(results.map(r => r.count))).sort((a, b) => b - a).slice(0, 2);
                return results.map(r => ({ ...r, isWinner: top2Scores.includes(r.count) }));
            };

            return (
                <div className="bg-gray-100 min-h-screen relative pb-10">
                    {deleteTarget && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6">
                                <h3 className="text-lg font-bold text-red-600 mb-4 flex items-center gap-2"><Icons.AlertTriangle /> 確認刪除</h3>
                                <p className="text-gray-600 mb-6">確定刪除 <span className="font-bold text-gray-900">{deleteTarget.name}</span>？</p>
                                <div className="flex justify-end gap-3"><button onClick={() => setDeleteTarget(null)} className="px-4 py-2 border rounded">取消</button><button onClick={executeDelete} className="px-4 py-2 bg-red-600 text-white rounded">刪除</button></div>
                            </div>
                        </div>
                    )}
                    <div className="bg-slate-800 text-white p-4 sticky top-0 z-10 shadow-lg flex justify-between items-center"><h1 className="font-bold text-lg flex items-center gap-2"><Icons.Settings className="text-blue-400"/> 後台管理</h1><button onClick={onLogout} className="text-sm bg-white/10 px-3 py-1.5 rounded hover:bg-white/20 flex items-center gap-2 border border-white/10"><Icons.LogOut size={14}/> 登出</button></div>
                    <div className="max-w-6xl mx-auto p-4 md:p-6">
                        <div className="flex border-b border-gray-300 mb-6 overflow-x-auto gap-2">
                            <button className={`px-6 py-3 flex items-center gap-2 whitespace-nowrap rounded-t-lg ${activeTab === 'results' ? 'bg-white text-blue-600 font-bold border-t-2 border-blue-600' : 'text-gray-500'}`} onClick={() => setActiveTab('results')}><Icons.FileText size={18}/> 結果與紀錄</button>
                            <button className={`px-6 py-3 flex items-center gap-2 whitespace-nowrap rounded-t-lg ${activeTab === 'doctors' ? 'bg-white text-blue-600 font-bold border-t-2 border-blue-600' : 'text-gray-500'}`} onClick={() => setActiveTab('doctors')}><Icons.Users size={18}/> 名單與密碼</button>
                            <button className={`px-6 py-3 flex items-center gap-2 whitespace-nowrap rounded-t-lg ${activeTab === 'settings' ? 'bg-white text-blue-600 font-bold border-t-2 border-blue-600' : 'text-gray-500'}`} onClick={() => setActiveTab('settings')}><Icons.Calendar size={18}/> 系統設定</button>
                        </div>
                        {loading ? <div className="text-center py-20 text-gray-500 animate-pulse">載入中...</div> : (
                            <div>
                                {activeTab === 'results' && (
                                    <div className="space-y-8 animate-fade-in">
                                        <div className="bg-white p-4 rounded-lg flex items-center gap-4 border shadow-sm flex-wrap">
                                           <span className="font-bold flex items-center gap-1"><Icons.Calendar size={18}/> 查詢：</span>
                                           <span>民國</span><input type="number" className="p-1 border rounded w-20 text-center" value={viewYear} onChange={e => setViewYear(Number(e.target.value))}/><span>年</span>
                                           <input type="number" className="p-1 border rounded w-16 text-center" value={viewMonth} onChange={e => setViewMonth(Number(e.target.value))}/><span>月</span>
                                           <button onClick={loadData} className="px-4 py-1 bg-blue-600 text-white rounded">查詢</button>
                                        </div>
                                        <div className="grid md:grid-cols-2 gap-6">
                                            {[ROLES.RESIDENT, ROLES.ATTENDING].map(role => {
                                                const res = calculateResults(role);
                                                return (
                                                    <div key={role} className={`bg-white p-6 rounded-xl shadow-lg border-t-4 ${role === ROLES.RESIDENT ? 'border-blue-500' : 'border-green-500'}`}>
                                                        <h3 className="font-bold text-lg border-b pb-2 mb-4 flex justify-between"><span>{role === ROLES.RESIDENT ? '優良住院醫師' : '優良主治醫師'}</span><span className="text-xs font-normal opacity-60 self-center">選出兩人</span></h3>
                                                        <ul className="space-y-2">
                                                            {res.map((r, i) => (
                                                                <li key={i} className={`flex justify-between p-2 rounded ${r.isWinner ? 'bg-yellow-50 font-bold' : 'bg-gray-50'}`}><span>{r.isWinner && '🏆 '}{r.name}</span><span>{r.count} 票</span></li>
                                                            ))}
                                                        </ul>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                        <div className="bg-white p-6 rounded-xl shadow border">
                                            <h3 className="font-bold mb-4 flex items-center gap-2"><Icons.FileText/> 詳細投票明細</h3>
                                            {['ATTENDING', 'RESIDENT'].map(rk => (
                                                <div key={rk} className="mb-6"><h4 className={`text-sm font-bold p-2 rounded ${rk==='ATTENDING'?'bg-blue-100':'bg-green-100'}`}>{rk==='ATTENDING'?'主治醫師投票紀錄':'住院醫師投票紀錄'}</h4>
                                                <table className="min-w-full text-sm mt-2 divide-y border"><thead className="bg-gray-50"><tr><th className="p-2 text-left">投票者</th><th className="p-2 text-left">投給</th><th className="p-2 text-left">時間</th><th className="p-2">操作</th></tr></thead><tbody className="divide-y">
                                                    {votes.filter(v => v.voterRole === ROLES[rk]).map(v => (<tr key={v.id} className="hover:bg-gray-50"><td className="p-2">{v.voterName}</td><td className="p-2">{(v.targetNames||[]).join('、')}</td><td className="p-2 text-gray-400 text-xs">{new Date(v.timestamp).toLocaleString('zh-TW')}</td><td className="p-2 text-center"><button onClick={()=>setDeleteTarget({id:v.id, name:v.voterName+'的選票', type:'vote'})} className="text-red-400 hover:text-red-600"><Icons.Trash2 size={16}/></button></td></tr>))}
                                                </tbody></table></div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'doctors' && (
                                    <div className="space-y-6 animate-fade-in">
                                        <div className="bg-white p-6 rounded-xl shadow border flex flex-col md:flex-row gap-3"><select className="p-2 border rounded" value={newDocRole} onChange={e=>setNewDocRole(e.target.value)}><option value={ROLES.RESIDENT}>住院醫師</option><option value={ROLES.ATTENDING}>主治醫師</option></select><input type="text" className="p-2 border rounded flex-grow" placeholder="醫師姓名" value={newDocName} onChange={e=>setNewDocName(e.target.value)}/><button onClick={handleAddDoctor} className="bg-blue-600 text-white px-6 rounded font-bold shadow hover:bg-blue-700">新增醫師</button></div>
                                        <div className="grid md:grid-cols-2 gap-6">
                                            {[ROLES.RESIDENT, ROLES.ATTENDING].map(role => (
                                                <div key={role} className={`bg-white rounded-xl shadow border-t-4 ${role===ROLES.RESIDENT?'border-blue-400':'border-green-400'}`}><div className="p-4 bg-gray-50 font-bold border-b flex justify-between"><span>{role===ROLES.RESIDENT?'住院醫師':'主治醫師'}</span><span className="text-xs font-normal">共 {doctors.filter(d=>d.role===role).length} 人</span></div><ul className="divide-y max-h-96 overflow-y-auto">{doctors.filter(d=>d.role===role).map(d => (<li key={d.id} className="p-4 flex justify-between items-center hover:bg-gray-50"><div><div className="font-bold">{d.name}</div><div className="text-xs text-gray-400">密碼: {d.password||'0000'}</div></div><button onClick={()=>setDeleteTarget({id:d.id, name:d.name, type:'doctor'})} className="text-gray-300 hover:text-red-500"><Icons.Trash2/></button></li>))}</ul></div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'settings' && (
                                    <div className="grid md:grid-cols-2 gap-8 animate-fade-in">
                                        <div className="bg-white p-8 rounded-xl shadow border border-gray-200">
                                            <h3 className="text-xl font-bold mb-6 flex items-center gap-2"><Icons.Calendar className="text-blue-500"/> 時間與期限設定</h3>
                                            <div className="mb-6"><label className="block font-bold text-gray-500 mb-2">當前投票月份</label><div className="flex gap-4"><div className="flex-1 flex bg-gray-50 border rounded p-2"><span>民國</span><input type="number" className="w-full bg-transparent text-center" value={editYear} onChange={e=>setEditYear(e.target.value)}/><span>年</span></div><div className="flex-1 flex bg-gray-50 border rounded p-2"><input type="number" className="w-full bg-transparent text-center" value={editMonth} onChange={e=>setEditMonth(e.target.value)}/><span>月</span></div></div></div>
                                            <div className="space-y-3 mb-6">
                                                <div className="bg-blue-50 p-3 rounded border border-blue-100 flex items-center gap-2"><span className="w-12 font-bold text-blue-800">開始</span>民國 <input type="number" className="w-16 border-b border-blue-300 bg-transparent text-center outline-none" value={votingStart.year} onChange={e=>setVotingStart({...votingStart, year:Number(e.target.value)})}/> 年 <input type="number" className="w-12 border-b border-blue-300 bg-transparent text-center outline-none" value={votingStart.month} onChange={e=>setVotingStart({...votingStart, month:Number(e.target.value)})}/> 月 <input type="number" className="w-12 border-b border-blue-300 bg-transparent text-center outline-none" value={votingStart.day} onChange={e=>setVotingStart({...votingStart, day:Number(e.target.value)})}/> 日</div>
                                                <div className="bg-gray-50 p-3 rounded border border-gray-200 flex items-center gap-2"><span className="w-12 font-bold text-gray-600">結束</span>民國 <input type="number" className="w-16 border-b border-gray-300 bg-transparent text-center outline-none" value={votingEnd.year} onChange={e=>setVotingEnd({...votingEnd, year:Number(e.target.value)})}/> 年 <input type="number" className="w-12 border-b border-gray-300 bg-transparent text-center outline-none" value={votingEnd.month} onChange={e=>setVotingEnd({...votingEnd, month:Number(e.target.value)})}/> 月 <input type="number" className="w-12 border-b border-gray-300 bg-transparent text-center outline-none" value={votingEnd.day} onChange={e=>setVotingEnd({...votingEnd, day:Number(e.target.value)})}/> 日</div>
                                            </div>
                                            <button onClick={handleUpdateSettings} className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow flex justify-center items-center gap-2"><Icons.Save size={18}/> 儲存設定</button>
                                        </div>
                                        <div className="space-y-6">
                                             <div className="bg-white p-8 rounded-xl shadow border border-gray-200"><h3 className="text-xl font-bold mb-6 text-purple-800 flex items-center gap-2"><Icons.Eye className="text-purple-500"/> 版面風格</h3><div className="grid grid-cols-3 gap-3">{Object.entries(THEMES).map(([k, t]) => (<button key={k} onClick={()=>setSelectedTheme(k)} className={`relative h-16 rounded-xl border-2 transition-all overflow-hidden ${selectedTheme===k?'border-purple-500 ring-2 ring-purple-200 scale-105':'border-gray-100 hover:border-gray-300'}`}><div className={`absolute inset-0 bg-gradient-to-br ${t.bgGradient} opacity-80`}></div><span className={`relative z-10 font-bold text-xs ${t.text}`}>{t.name}</span></button>))}</div></div>
                                             <div className="bg-white p-8 rounded-xl shadow border border-gray-200"><h3 className="text-xl font-bold mb-4 flex items-center gap-2"><Icons.Lock className="text-gray-600"/> 管理員密碼</h3><input type="password" placeholder="輸入新密碼 (不修改請留空)" value={newPassword} onChange={e=>setNewPassword(e.target.value)} className="w-full p-3 border rounded-lg bg-gray-50 focus:bg-white transition-colors"/></div>
                                             <div className="bg-red-50 p-8 rounded-xl shadow border border-red-200"><h3 className="text-xl font-bold text-red-800 mb-4 flex items-center gap-2"><Icons.AlertTriangle /> 危險區域</h3><button onClick={handleResetVotes} className="w-full bg-white text-red-600 border border-red-200 py-3 rounded-lg font-bold hover:bg-red-600 hover:text-white transition-colors flex items-center justify-center gap-2"><Icons.RefreshCw /> 清空本月所有資料</button></div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- 6. 主程式：App ---
        const App = () => {
            const [config, setConfig] = useState(null);
            const [doctors, setDoctors] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentUser, setCurrentUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [selectedRole, setSelectedRole] = useState(ROLES.RESIDENT);
            const [selectedVoterId, setSelectedVoterId] = useState('');
            const [voterPassword, setVoterPassword] = useState('');
            const [votedMap, setVotedMap] = useState({});

            useEffect(() => { initializeData(); }, []);

            const initializeData = async () => {
                setLoading(true);
                try {
                    const cfgSnap = await db.collection('config').get();
                    let sysCfg;
                    if (!cfgSnap.empty) { sysCfg = cfgSnap.docs[0].data(); }
                    else {
                        const today = new Date(); sysCfg = { currentYear: today.getFullYear() - 1911, currentMonth: today.getMonth() + 1, adminPassword: '0000', theme: 'blue', votingStart: { year: 114, month: 1, day: 1 }, votingEnd: { year: 114, month: 12, day: 31 } };
                        await db.collection('config').add(sysCfg);
                    }
                    setConfig(sysCfg);
                    const docSnap = await db.collection('doctors').get();
                    setDoctors(docSnap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    const vSnap = await db.collection('votes').where("year", "==", sysCfg.currentYear).where("month", "==", sysCfg.currentMonth).get();
                    const sm = {}; vSnap.forEach(d => sm[d.data().voterName] = true); setVotedMap(sm);
                } catch (e) { alert("連線錯誤"); } finally { setLoading(false); }
            };

            const handleVoterLogin = () => {
                if (!selectedVoterId) { alert('請選擇姓名'); return; }
                const dr = doctors.find(d => d.id === selectedVoterId);
                if (voterPassword !== (dr.password || '0000')) { alert("密碼錯誤 (預設 0000)"); return; }
                setCurrentUser(dr);
            };

            const handleAdminLogin = () => {
                const adminPwd = config?.adminPassword || '0000';
                if (voterPassword === adminPwd) { setIsAdmin(true); setShowAdminLogin(false); setVoterPassword(''); }
                else alert('密碼錯誤');
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-gray-100 font-bold animate-pulse text-gray-500">系統載入中...</div>;
            if (isAdmin) return <AdminDashboard config={config} onLogout={() => {setIsAdmin(false); initializeData();}} onConfigUpdate={initializeData} />;
            if (currentUser) return <div className="min-h-screen bg-gray-50 px-4 py-8"><VotingForm voter={currentUser} config={config} allDoctors={doctors} onVoteComplete={() => {setCurrentUser(null); initializeData();}} onLogout={() => {setCurrentUser(null); initializeData();}}/></div>;

            const theme = THEMES[config?.theme || 'blue'];
            return (
                <div className={`min-h-screen bg-gradient-to-b ${theme.bgGradient} flex flex-col items-center justify-center p-4 transition-all duration-700`}>
                    <div className="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden relative animate-scale-in">
                        <div className={`bg-gradient-to-r ${theme.headerGradient} p-8 text-center text-white`}>
                            <h1 className="text-xl font-bold mb-1 opacity-90">衛生福利部嘉南療養院</h1>
                            <h2 className="text-3xl font-black tracking-widest drop-shadow-lg">醫科優良醫師票選系統</h2>
                            <div className="mt-4 text-sm bg-white/20 inline-block px-4 py-1.5 rounded-full backdrop-blur-md border border-white/30 shadow-inner">民國 {config.currentYear} 年 {config.currentMonth} 月</div>
                        </div>
                        <div className="p-8 pb-12">
                            {!showAdminLogin ? (
                                <div className="space-y-6 animate-fade-in">
                                    <div><label className="block text-sm font-bold text-gray-700 mb-2">1. 選擇您的身分</label>
                                    <div className="flex bg-gray-100 p-1 rounded-xl mb-4"><button className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all ${selectedRole === ROLES.RESIDENT ? `bg-white shadow ${theme.text}` : 'text-gray-500'}`} onClick={() => { setSelectedRole(ROLES.RESIDENT); setSelectedVoterId(''); setVoterPassword(''); }}>住院醫師</button><button className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all ${selectedRole === ROLES.ATTENDING ? `bg-white shadow ${theme.text}` : 'text-gray-500'}`} onClick={() => { setSelectedRole(ROLES.ATTENDING); setSelectedVoterId(''); setVoterPassword(''); }}>主治醫師</button></div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">2. 選擇姓名</label>
                                    <div className="relative mb-4"><div className="absolute left-3 top-3 text-gray-400"><Icons.UserCircle2 /></div><select className="w-full pl-10 pr-4 py-2 border rounded-xl focus:ring-2 outline-none appearance-none bg-white transition-all shadow-sm" value={selectedVoterId} onChange={e => { setSelectedVoterId(e.target.value); setVoterPassword(''); }}><option value="" disabled>-- 請下拉選擇 --</option>
                                        {doctors.filter(d => d.role === selectedRole).sort((a,b)=>a.name.localeCompare(b.name,'zh-TW')).map(d => (
                                            <option key={d.id} value={d.id}>{d.name} {votedMap[d.name] ? '(已填寫，可修改)' : ''}</option>
                                        ))}
                                    </select></div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">3. 輸入 4 位密碼 <span className="font-normal text-gray-400">(預設 0000)</span></label>
                                    <div className="relative"><div className="absolute left-3 top-3 text-gray-400"><Icons.KeyRound /></div><input type="password" inputMode="numeric" maxLength="4" placeholder="請輸入密碼" className="w-full pl-10 pr-4 py-2 border rounded-xl focus:ring-2 outline-none transition-all shadow-sm" value={voterPassword} onChange={e => setVoterPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleVoterLogin()}/></div>
                                    <button onClick={handleVoterLogin} className={`w-full mt-8 bg-gradient-to-r ${theme.buttonGradient} text-white py-4 rounded-xl font-black shadow-xl active:scale-95 transition-all tracking-widest text-lg`}>進入投票</button></div>
                                </div>
                            ) : (
                                <div className="space-y-6 animate-fade-in"><div className="flex items-center gap-2 mb-4"><button onClick={() => setShowAdminLogin(false)} className="p-2 rounded-full hover:bg-gray-100 transition-colors"><Icons.ArrowLeft /></button><h3 className="font-bold text-xl">管理員登入</h3></div>
                                <div><label className="block text-sm font-bold text-gray-700 mb-2">管理密碼</label><div className="relative"><div className="absolute left-3 top-3 text-gray-400"><Icons.Lock /></div><input type="password" autoFocus placeholder="請輸入管理密碼" className="w-full pl-10 pr-4 py-2 border rounded-xl focus:ring-2 outline-none shadow-sm" value={voterPassword} onChange={e => setVoterPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAdminLogin()}/></div>
                                <button onClick={handleAdminLogin} className="w-full mt-8 bg-slate-800 text-white py-4 rounded-xl font-black shadow-xl transition-all">登入後台</button></div></div>
                            )}
                        </div>
                        <div className="bg-gray-50 p-4 flex justify-between items-center text-xs text-gray-400 border-t absolute bottom-0 w-full"><span>© 嘉南療養院 一般精神科</span>{!showAdminLogin && <button onClick={() => {setShowAdminLogin(true); setVoterPassword('');}} className="flex items-center gap-1 opacity-40 hover:opacity-100 transition-opacity"><Icons.Lock size={12} /> 管理員</button>}</div>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
